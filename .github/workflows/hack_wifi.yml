name: Hack WI-FI CI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/addon/hack_wifi/**'

permissions: write-all

jobs:
  build-release:
    if: ${{ github.repository_owner == 'Zenlua' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build add-on
        run: |
          cd .github/addon/hack_wifi
          7z a -t7z -y ../hack_wifi.add

      - name: Upload module
        uses: softprops/action-gh-release@v2
        with:
          name: "Tmp"
          tag_name: "V1"
          files: .github/addon/hack_wifi.add